<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实用工具箱 - 解决日常生活中的小问题</title>
  <meta name="description" content="一个收集了各种实用小工具的网站，帮你解决日常生活中的小问题">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>✨ 实用工具箱</h1>
      <p>解决你日常生活中的小问题</p>
    </header>

    <div class="card">
      <h2 style="margin-bottom: 10px;">🛠 热门工具</h2>
      <p style="color: #7f8c8d;">选择一个工具开始使用</p>
      
      <div class="tool-grid">
        <a href="buy-or-not.html" class="tool-card">
          <div class="tool-icon">🤔</div>
          <h3>买不买决策器</h3>
          <p>回答几个问题，帮你理性判断该不该买</p>
        </a>
        
        <a href="gift-recommender.html" class="tool-card">
          <div class="tool-icon">🎁</div>
          <h3>礼物推荐</h3>
          <p>根据对方情况，给你推荐合适的礼物</p>
        </a>
        
        <a href="checklist.html" class="tool-card">
          <div class="tool-icon">✅</div>
          <h3>出门检查清单</h3>
          <p>出门前打个勾，不再忘带东西</p>
        </a>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-bottom: 10px;">📦 更多工具</h2>
      <p style="color: #7f8c8d;">持续开发中，敬请期待</p>
      
      <div class="tool-grid">
        <div class="tool-card coming-soon">
          <div class="tool-icon">💳</div>
          <h3>会员值不值 <span class="coming-soon-badge">即将上线</span></h3>
          <p>算算你买的会员真的划算吗</p>
        </div>
        
        <div class="tool-card coming-soon">
          <div class="tool-icon">🍽</div>
          <h3>今晚吃什么 <span class="coming-soon-badge">即将上线</span></h3>
          <p>选择困难症救星</p>
        </div>
        
        <div class="tool-card coming-soon">
          <div class="tool-icon">📅</div>
          <h3>纪念日倒计时 <span class="coming-soon-badge">即将上线</span></h3>
          <p>重要日子不再错过</p>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2026 实用工具箱 · 让生活更简单</p>
    </footer>
  </div>
</body>
</html>
